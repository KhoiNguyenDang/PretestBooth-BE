version: "3.8"

# Judge0 CE - Code Execution Engine (Local Development)
# Usage: docker-compose -f docker-compose.judge0.yml up -d
# API: http://localhost:2358

services:
  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: judge0-server
    ports:
      - "2358:2358"
    privileged: true
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      # Disable authentication for local development
      AUTHN_HEADER: ""
      AUTHN_TOKEN: ""
      AUTHZ_HEADER: ""
      AUTHZ_TOKEN: ""
      # Worker configuration
      ENABLE_WAIT_RESULT: "true"
      ENABLE_BATCHED_SUBMISSIONS: "true"
      # Resource limits
      CPU_TIME_LIMIT: 10
      CPU_EXTRA_TIME: 5
      WALL_TIME_LIMIT: 20
      MEMORY_LIMIT: 256000
      STACK_LIMIT: 64000
      MAX_PROCESSES_AND_OR_THREADS: 60
      MAX_FILE_SIZE: 4096
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    restart: unless-stopped

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: judge0-workers
    command: ["./scripts/workers"]
    privileged: true
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      ENABLE_WAIT_RESULT: "true"
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    restart: unless-stopped

  judge0-db:
    image: postgres:16-alpine
    container_name: judge0-db
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  judge0-redis:
    image: redis:7-alpine
    container_name: judge0-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  judge0-db-data:
